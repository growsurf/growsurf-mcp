name: Publish to npm

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: npm
      - run: npm install -g "npm@^11.5.1"
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm pack --dry-run

  publish:
    needs: validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g "npm@^11.5.1"
      - run: npm ci
      - run: npm --version
      - name: Read package metadata
        id: pkg
        run: |
          name=$(node -e "console.log(require('./package.json').name)")
          version=$(node -e "console.log(require('./package.json').version)")
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Check whether version is already published
        id: npm
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version --json >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} is already published. Skipping npm publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} is not published yet."
          fi
      - name: Publish to npm
        if: steps.npm.outputs.exists == 'false'
        run: npm publish --access public --provenance
      - name: Tag release commit
        if: steps.npm.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          tag="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${tag}" "${GITHUB_SHA}"
          git push origin "${tag}"
      - name: Create GitHub release
        if: steps.npm.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          tag="v${VERSION}"
          gh release create "${tag}" --title "${tag}" --generate-notes
